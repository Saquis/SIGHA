<!-- SIGHA - Sistema de Gestión de Horarios y Asignación -->

<div class="p-6">
  <h2 class="text-2xl font-bold text-blue-800 mb-6">Gestión de Docentes</h2>

  <!-- Mensaje de error -->
  <div *ngIf="error" class="bg-red-100 text-red-700 px-4 py-3 rounded mb-4 text-sm">
    {{ error }}
  </div>

  <!-- Formulario -->
  <div class="bg-white rounded-lg shadow p-6 mb-6">
    <h3 class="text-lg font-medium text-gray-700 mb-4">Agregar Docente</h3>
    <div class="grid grid-cols-2 gap-4">
      <input [(ngModel)]="nuevo.nombre" placeholder="Nombre completo"
        class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      <input [(ngModel)]="nuevo.email" placeholder="Correo electrónico"
        class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      <input type="password" [(ngModel)]="nuevo.password" placeholder="Contraseña"
        class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      <select [(ngModel)]="nuevo.tipo"
        class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="tiempo_completo">Tiempo Completo</option>
        <option value="tiempo_parcial">Tiempo Parcial</option>
      </select>
    </div>
    <button (click)="crearDocente()" [disabled]="loading"
      class="mt-4 bg-blue-800 text-white px-6 py-2 rounded text-sm font-medium hover:bg-blue-700 transition disabled:opacity-50">
      {{ loading ? 'Creando...' : 'Agregar Docente' }}
    </button>
  </div>

  <!-- Tabla -->
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-blue-800 text-white">
        <tr>
          <th class="px-4 py-3 text-left">Nombre</th>
          <th class="px-4 py-3 text-left">Email</th>
          <th class="px-4 py-3 text-left">Tipo</th>
          <th class="px-4 py-3 text-left">Horas</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let d of docentes; let i = index" [class]="i % 2 === 0 ? 'bg-white' : 'bg-gray-50'">
          <td class="px-4 py-3">{{ d.usuario?.nombre || 'N/A' }}</td>
          <td class="px-4 py-3">{{ d.usuario?.email || 'N/A' }}</td>
          <td class="px-4 py-3">
            <span [class]="d.tipo === 'tiempo_completo' ? 'bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs' : 'bg-gray-100 text-gray-800 px-2 py-1 rounded text-xs'">
              {{ d.tipo === 'tiempo_completo' ? 'Tiempo Completo' : 'Tiempo Parcial' }}
            </span>
          </td>
          <td class="px-4 py-3">{{ d.horas_acumuladas || 0 }}h</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
