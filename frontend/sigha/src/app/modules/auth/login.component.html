<!-- SIGHA - Sistema de Gestión de Horarios y Asignación -->

<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-blue-800">SIGHA</h1>
      <p class="text-gray-500 mt-2 text-sm">Sistema de Gestión de Horarios y Asignación</p>
      <p class="text-gray-400 text-xs mt-1">Instituto Superior Tecnológico Quito</p>
    </div>

    <div *ngIf="error" class="bg-red-100 text-red-700 px-4 py-3 rounded mb-4 text-sm">
      {{ error }}
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="correo@sigha.com"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <button
      (click)="login()"
      class="w-full bg-blue-800 text-white py-2 rounded font-medium hover:bg-blue-700 transition"
    >
      Ingresar
    </button>

  </div>
</div>
