<!-- SIGHA - Sistema de Gestión de Horarios y Asignación -->

<div class="p-6">
  <h2 class="text-2xl font-bold text-blue-800 mb-6">Mis Horarios</h2>

  <div *ngIf="error" class="bg-red-100 text-red-700 px-4 py-3 rounded mb-4 text-sm">{{ error }}</div>

  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-blue-800 text-white">
        <tr>
          <th class="px-4 py-3 text-left">Asignatura</th>
          <th class="px-4 py-3 text-left">Jornada</th>
          <th class="px-4 py-3 text-left">Día</th>
          <th class="px-4 py-3 text-left">Hora Inicio</th>
          <th class="px-4 py-3 text-left">Hora Fin</th>
          <th class="px-4 py-3 text-left">Paralelo</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let h of horarios; let i = index" [class]="i % 2 === 0 ? 'bg-white' : 'bg-gray-50'">
          <td class="px-4 py-3">{{ h.asignatura.nombre }}</td>
          <td class="px-4 py-3">
            <span [class]="h.jornada === 'matutina' ? 'bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-xs' : 'bg-indigo-100 text-indigo-800 px-2 py-1 rounded text-xs'">
              {{ h.jornada }}
            </span>
          </td>
          <td class="px-4 py-3">{{ h.dia }}</td>
          <td class="px-4 py-3">{{ h.hora_inicio }}</td>
          <td class="px-4 py-3">{{ h.hora_fin }}</td>
          <td class="px-4 py-3">{{ h.paralelo }}</td>
        </tr>
        <tr *ngIf="horarios.length === 0">
          <td colspan="6" class="px-4 py-6 text-center text-gray-400">
            No tienes horarios asignados
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
